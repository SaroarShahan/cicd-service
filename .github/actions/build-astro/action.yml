name: Build Astro
description:
  Install dependencies with npm cache, build the Astro static site, and upload the dist artifact.

inputs:
  node-version:
    description: Node.js version (e.g. `24.15.0`) to use for the build.
    required: false
    default: '24.15.0'
  artifact-name:
    description: Name to give the uploaded build artifact.
    required: false
    default: dist

runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'yarn'

    - name: Install
      run: yarn install --frozen-lockfile
      shell: bash

    - name: Build
      run: yarn build
      shell: bash

    - name: Upload dist
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.artifact-name }}
        path: dist/
